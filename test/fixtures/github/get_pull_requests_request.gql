query {
repository(owner: "kewisch", name: "test") {
pullRequests(first: 100, orderBy: {field: UPDATED_AT, direction: DESC}) {
nodes {
id
number
url
author {
login
}
state
isDraft
closingIssuesReferences(first: 20) {
nodes {
title
number
updatedAt
createdAt
closedAt
state
stateReason
url
id
body
parent {
id
number
repository {
nameWithOwner
}
}
repository {
id
nameWithOwner
name
isPrivate
}
labels(first: 100) {
nodes {
name
}
}
issueType {
id
name
}
assignees(first: 10) {
nodes {
id
login
}
}
issueFieldValues(first: 20) {
nodes {
__typename
... on IssueFieldSingleSelectValue {
name
value
optionId
field {
__typename
... on IssueFieldSingleSelect {
id
}
}
}
... on IssueFieldNumberValue {
value
field {
__typename
... on IssueFieldNumber {
id
}
}
}
... on IssueFieldTextValue {
value
field {
__typename
... on IssueFieldText {
id
}
}
}
... on IssueFieldDateValue {
value
field {
__typename
... on IssueFieldDate {
id
}
}
}
}
}
timelineItems(last: 50, itemTypes: [CROSS_REFERENCED_EVENT]) {
nodes {
__typename
... on CrossReferencedEvent {
willCloseTarget
source {
__typename
... on PullRequest {
url
reviewRequests(first: 10) {
nodes {
requestedReviewer {
__typename
... on User {
id
login
}
}
}
}
}
}
}
}
}
projectItems(first: 10, includeArchived: true) {
nodes {
id
project {
__typename
... on ProjectV2 {
id
number
title
}
... on Node {
id
}
}
start_date: fieldValueByName(name: "Start Date") {
__typename
... on ProjectV2ItemFieldDateValue {
__typename
date
... on ProjectV2ItemFieldValueCommon {
field {
__typename
... on ProjectV2FieldCommon {
id
}
}
}
}
}
target_date: fieldValueByName(name: "Target Date") {
__typename
... on ProjectV2ItemFieldDateValue {
__typename
date
... on ProjectV2ItemFieldValueCommon {
field {
__typename
... on ProjectV2FieldCommon {
id
}
}
}
}
}
status: fieldValueByName(name: "Status") {
__typename
... on ProjectV2ItemFieldSingleSelectValue {
field {
__typename
... on ProjectV2FieldCommon {
id
}
}
name
optionId
}
}
link: fieldValueByName(name: "Link") {
__typename
... on ProjectV2ItemFieldTextValue {
field {
__typename
... on ProjectV2FieldCommon {
id
}
}
text
}
}
sprint: fieldValueByName(name: "Sprint") {
__typename
... on ProjectV2ItemFieldIterationValue {
field {
__typename
... on ProjectV2FieldCommon {
id
}
}
iterationId
startDate
title
duration
}
}
}
}
}
}
}
}
}
}